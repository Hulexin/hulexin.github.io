baseURL = 'https://lifeas.work/'
languageCode = "zh-CN"
title = "一人公司，生产收录"
subtitle = "网站|软件|生活|工作"
theme = "hugo-webstack"

#true:允许大写字母url路径，false:将url路径转换成小写
disablePathToLower = true

#页脚：作者名字
copyright = "K"

#网站信息，不显示，仅供搜索引擎参考
[params]
  keywords = "一人公司工具收录,创业者工具收录，跨境独立站工具收录"
  description = "一人公司，跨境独立站创业者的工具收录网站"

#是否开启搜索栏，true开启，false关闭
[params.search]
  enable = true

#设置默认模式，true暗色模式，false亮色模式
[params.darkmode]
  enable = false

#主页菜单栏显示在线编辑按钮（编辑github文件，适用于自动化部署的情况）
[params.edit]
  # true显示按钮，false不显示
  enable = true
  # github文件的远程链接，改成自己的
  url = "https://github.com/oulh/nav/blob/main/data/webstack.yml"
  
#桌面端右上角code按钮
[params.github]
  enable = false #true显示 false隐藏
  url = "https://github.com/oulh/nav"
  
[permalinks]  
  404 = "/404.html"

#是否对本地搜索功能开启拼音匹配，true开启，false禁止。
#拼音库体积337k，支持首字母匹配
[params.pinyin]
  enable = true